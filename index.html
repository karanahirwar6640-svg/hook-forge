<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0; min-height: 100vh; font-family: 'Noto Sans JP', sans-serif;
            background-color: #000; color: #fef3c7; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            overflow-x: hidden; position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            perspective: 1500px;
        }
        
        /* HIGH-RES CLEAR VIDEO BACKGROUND */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; pointer-events: none;
            transition: opacity 0.4s ease-in-out, transform 0.5s ease-out;
            transform-origin: center; opacity: 0.85;
        }
        .video-switch-anim { opacity: 0 !important; transform: scale(1.03); }
        .video-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.25); z-index: 1; pointer-events: none; }
        
        /* ADAPTIVE TRUE FROSTED GLASS PANELS */
        .glass-panel {
            background: rgba(15, 15, 20, 0.35); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            transition: transform 0.1s ease-out, border-color 0.6s, box-shadow 0.6s;
            transform-style: preserve-3d; will-change: transform;
            z-index: 10;
        }
        
        .anime-title { font-family: 'Cinzel', serif; text-shadow: 0 0 25px rgba(239, 68, 68, 0.7); transition: all 0.5s ease; }
        
        .crimson-input { 
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fef3c7; transition: all 0.3s; 
        }

        select.crimson-input option { background: #141419; color: #fef3c7; }
        
        /* SHOCKWAVE ELECTRIC BUTTON */
        .crimson-btn { 
            position: relative; overflow: hidden; cursor: pointer;
            background: linear-gradient(45deg, #991b1b, #dc2626); border: 1px solid #f87171; 
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); transition: all 0.3s ease; 
        }
        .crimson-btn:hover { background: linear-gradient(45deg, #b91c1c, #ef4444); box-shadow: 0 0 30px rgba(239, 68, 68, 0.7); transform: translateY(-2px); }
        
        .shockwave {
            position: absolute; background: rgba(255, 255, 255, 0.7); border-radius: 50%;
            transform: scale(0); animation: ripple 0.5s cubic-bezier(0.1, 0.8, 0.3, 1); pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(3.5); opacity: 0; } }

        .tab-btn { padding: 12px 24px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 8px; transition: all 0.3s; cursor: pointer; }
        .tab-active { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fef3c7; box-shadow: 0 0 15px rgba(239,68,68,0.3); }
        .tab-inactive { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); color: rgba(254, 243, 199, 0.5); }

        .floating-btn { cursor: pointer; z-index: 100; background: rgba(10,10,15,0.8); padding: 16px; border-radius: 50%; transition: all 0.3s; display: flex; align-items: center; justify-content: center; width: 55px; height: 55px; border: 1px solid rgba(255,255,255,0.1); }
        .floating-btn:hover { transform: scale(1.1); background: rgba(20,20,30,0.9); }
        
        #theme-btn { position: fixed; top: 20px; right: 20px; color: #d4af37; border-color: rgba(212,175,55,0.3); }
        #multiverse-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ef4444; border-color: rgba(239,68,68,0.3); }
        #audio-btn { position: fixed; bottom: 20px; right: 20px; color: #ef4444; border-color: rgba(239,68,68,0.3); }

        /* MULTIVERSE THEME AURAS */
        body.theme-aura-1 .glass-panel { border-color: rgba(59, 130, 246, 0.4); }
        body.theme-aura-1 .anime-title { color: #60a5fa !important; text-shadow: 0 0 25px rgba(59, 130, 246, 0.7); }
        body.theme-aura-1 .tab-active { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        
        body.theme-aura-2 .glass-panel { border-color: rgba(168, 85, 247, 0.4); }
        body.theme-aura-2 .anime-title { color: #c084fc !important; text-shadow: 0 0 25px rgba(168, 85, 247, 0.7); }
        body.theme-aura-2 .tab-active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; }

        /* LUXURY SYSTEM */
        body.theme-luxury { background: #030303; color: #fff; font-family: 'Inter', sans-serif; }
        body.theme-luxury .glass-panel { background: #09090b !important; backdrop-filter: none !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        body.theme-luxury .anime-title { font-family: 'Inter', sans-serif !important; font-weight: 800 !important; text-shadow: none !important; color: #fff !important; }
        body.theme-luxury .crimson-btn { background: #fff !important; border: none !important; color: #000 !important; font-weight: 800 !important; }
        body.theme-luxury .tab-active { background: #fff !important; color: #000 !important; border: none; }
        body.theme-luxury .bg-video, body.theme-luxury .video-overlay { opacity: 0 !important; visibility: hidden; }
        body.theme-luxury #multiverse-btn { opacity: 0; pointer-events: none; }
    </style>
</head>

    <script>
        let currentMode = 'hook';
        let isMuted = true;
        let isLuxuryMode = false;
        let currentAura = 0;

        const videos = [
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20Natural%20Makeup%20Looks%20Inspiration%20for%20Summer-pin-id-587860557652168444.mp4",
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/your_name.mp4",
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20From%20beginner%20to%20obsessed%20Love%20these%20easy%20pet-friendly%20home%20ideas%20youll%20want%20to%20recreate%20this%20weekend%20that%20balance%20trend%20comfor%20(1).mp4"
        ];

        // 3D MAGNETIC PARALLAX ENGINE
        document.querySelectorAll('.parallax-panel').forEach(panel => {
            panel.addEventListener('mousemove', e => {
                if(window.innerWidth < 768) return; 
                const rect = panel.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height/2) / (rect.height/2)) * -5; 
                const rotateY = ((x - rect.width/2) / (rect.width/2)) * 5;
                panel.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            panel.addEventListener('mouseleave', () => { panel.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)'; });
        });

        // MATRIX DECRYPTION TEXT ENGINE (45 Frames for Extreme Feel)
        function matrixDecrypt(elementId, targetText) {
            const el = document.getElementById(elementId);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*<>?';
            let iterations = 0; const maxIterations = 35; 
            const interval = setInterval(() => {
                el.innerText = targetText.split('').map((char, index) => {
                    if (index < (iterations / maxIterations) * targetText.length) return char;
                    if (char === ' ' || char === '\n') return char;
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                iterations++;
                if (iterations >= maxIterations) { clearInterval(interval); el.innerText = targetText; }
            }, 30); 
        }

        // ELECTRIC SHOCKWAVE TRIGGER
        function createShockwave(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const d = Math.max(btn.clientWidth, btn.clientHeight);
            circle.style.width = circle.style.height = `${d}px`;
            const rect = btn.getBoundingClientRect();
            circle.style.left = `${e.clientX - rect.left - d/2}px`;
            circle.style.top = `${e.clientY - rect.top - d/2}px`;
            circle.className = 'shockwave';
            const oldShockwave = btn.querySelector('.shockwave');
            if (oldShockwave) oldShockwave.remove();
            btn.appendChild(circle);
        }

        // SLOT MACHINE ENGINE (Reusable for all scores)
        function animateScore(elementId, targetValue) {
            const scoreEl = document.getElementById(elementId);
            scoreEl.classList.remove('score-animate'); 
            let startValue = 0, duration = 1200, startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                scoreEl.innerText = Math.floor(progress * (targetValue - startValue) + startValue);
                if (progress < 1) window.requestAnimationFrame(step);
                else { scoreEl.innerText = targetValue; scoreEl.classList.add('score-animate'); }
            }
            window.requestAnimationFrame(step);
        }

        function playWarpTransition(callback) {
            const vid = document.getElementById('bg-vid');
            vid.classList.add('video-switch-anim'); 
            setTimeout(() => { callback(); setTimeout(() => { vid.classList.remove('video-switch-anim'); }, 100); }, 300);
        }

        function cycleAura(e) {
            if (isLuxuryMode) return;
            createShockwave(e);
            currentAura = (currentAura + 1) % videos.length;
            playWarpTransition(() => {
                const vid = document.getElementById('bg-vid');
                vid.src = videos[currentAura]; vid.play();
                document.body.classList.remove('theme-aura-1', 'theme-aura-2');
                const btn = document.getElementById('multiverse-btn');
                if(currentAura === 1) { document.body.classList.add('theme-aura-1'); btn.style.borderColor = '#3b82f6'; btn.style.color = '#3b82f6'; } 
                else if(currentAura === 2) { document.body.classList.add('theme-aura-2'); btn.style.borderColor = '#a855f7'; btn.style.color = '#a855f7'; } 
                else { btn.style.borderColor = 'rgba(239,68,68,0.3)'; btn.style.color = '#ef4444'; }
            });
        }

        function toggleDomainExpansion(e) {
            createShockwave(e); 
            playWarpTransition(() => {
                const body = document.body; const icon = document.getElementById('theme-icon'); const themeBtn = document.getElementById('theme-btn');
                isLuxuryMode = !isLuxuryMode;
                if (isLuxuryMode) {
                    body.classList.add('theme-luxury'); icon.className = 'fa-solid fa-eye text-xl';
                    themeBtn.style.borderColor = '#fff'; themeBtn.style.color = '#fff';
                    document.getElementById('empty-icon').className = 'fa-solid fa-crosshairs text-7xl text-white/40 mb-6';
                } else {
                    body.classList.remove('theme-luxury'); icon.className = 'fa-solid fa-crown text-xl';
                    themeBtn.style.borderColor = 'rgba(212,175,55,0.3)'; themeBtn.style.color = '#d4af37';
                    document.getElementById('empty-icon').className = 'fa-solid fa-crosshairs text-7xl text-red-500/50 mb-6';
                    cycleAura({currentTarget: document.getElementById('multiverse-btn'), clientX:0, clientY:0});
                    currentAura = (currentAura - 1 + videos.length) % videos.length;
                }
            });
        }

        function toggleAudio(e) {
            createShockwave(e);
            const vid = document.getElementById('bg-vid'); const icon = document.getElementById('audio-icon');
            isMuted = !isMuted; vid.muted = isMuted; icon.className = isMuted ? 'fa-solid fa-volume-xmark text-lg' : 'fa-solid fa-volume-high text-lg';
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-hook').className = mode === 'hook' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tab-script').className = mode === 'script' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('inputs-hook').style.display = mode === 'hook' ? 'block' : 'none';
            document.getElementById('inputs-script').style.display = mode === 'script' ? 'flex' : 'none';
            document.getElementById('btn-ignite').innerHTML = mode === 'hook' ? '<i class="fa-solid fa-bolt mr-2"></i> Ignite Hook Engine' : '<i class="fa-solid fa-scroll mr-2"></i> Forge Master Script';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('results-hook').style.display = 'none'; document.getElementById('results-script').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        function copyText(id) { 
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const btn = event.currentTarget; const oldHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Copied!';
            setTimeout(() => { btn.innerHTML = oldHTML; }, 1500);
        }

        async function igniteEngine() {
            document.getElementById('empty-state').style.display = 'none'; 
            document.getElementById('results-hook').style.display = 'none';
            document.getElementById('results-script').style.display = 'none'; 
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            try {
                let endpoint = currentMode === 'hook' ? '/forge_hook' : '/forge_script';
                let payloadData = currentMode === 'hook' ? { niche: document.getElementById('h-niche').value, audience: document.getElementById('h-audience').value, tone: document.getElementById('h-tone').value, topic: document.getElementById('h-topic').value } : { script: document.getElementById('s-raw').value, url: document.getElementById('s-url').value };
                const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloadData) });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.error) throw new Error(data.error);

                if (currentMode === 'hook') {
                    document.getElementById('results-hook').style.display = 'block';
                    
                    // Trigger Slot Machines for Hooks
                    animateScore('scoreA', data.hook_a.score);
                    animateScore('scoreB', data.hook_b.score);
                    
                    // Trigger Matrix Reveals
                    matrixDecrypt('textA', `"${data.hook_a.text}"`); 
                    matrixDecrypt('textB', `"${data.hook_b.text}"`);
                } else {
                    document.getElementById('results-script').style.display = 'block';
                    // Trigger Slot Machine & Matrix for Script
                    animateScore('s-score', data.retention_score); 
                    matrixDecrypt('s-master', data.master_script);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorBox').innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> <b>Engine Malfunction:</b> ${err.message}`; 
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('empty-state').style.display = 'block';
            }
        }
    </script>
</body>
</html>
