<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Forge | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DYNAMIC THEMES */
        :root {
            --c1: #ea580c; --c2: #f97316; --border: #fdba74; 
            --glow: rgba(249,115,22, 0.5); --bg-glow: rgba(249,115,22, 0.15);
        }
        body.theme-blue {
            --c1: #1d4ed8; --c2: #3b82f6; --border: #93c5fd; 
            --glow: rgba(59,130,246, 0.5); --bg-glow: rgba(59,130,246, 0.15);
        }
        body.theme-purple {
            --c1: #7e22ce; --c2: #a855f7; --border: #d8b4fe; 
            --glow: rgba(168,85,247, 0.5); --bg-glow: rgba(168,85,247, 0.15);
        }
        body.theme-luxury {
            --c1: #ffffff; --c2: #ffffff; --border: rgba(255,255,255,0.2); 
            --glow: rgba(255,255,255,0.1); --bg-glow: transparent; background-color: #050505 !important;
        }

        body { margin: 0; min-height: 100vh; font-family: 'Noto Sans JP', sans-serif; background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; position: relative; }
        
        .bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; transition: opacity 0.5s ease; opacity: 0.85; }
        .video-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.15); z-index: 1; pointer-events: none; }
        
        /* 💎 CRYSTAL CLEAR FROSTED GLASS EFFECT */
        .glass-panel {
            background: rgba(0, 0, 0, 0.1); /* Super low opacity for max video visibility */
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); /* Heavy blur */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3); /* Glass Edge Reflection */
            border-left: 1px solid rgba(255, 255, 255, 0.2); /* Glass Edge Reflection */
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            z-index: 10; transition: all 0.5s ease;
        }
        
        .anime-title { font-family: 'Cinzel', serif; color: var(--c2); text-shadow: 0 0 20px var(--glow); transition: color 0.5s, text-shadow 0.5s;}
        .text-theme { color: var(--c2) !important; transition: color 0.5s; }
        
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: all 0.3s; }
        .glass-input:focus { outline: none; border-color: var(--c2); box-shadow: 0 0 10px var(--glow); background: rgba(0,0,0,0.7); }
        select.glass-input option { background: #111; color: #fff; }
        
        .premium-btn { position: relative; overflow: hidden; cursor: pointer; background: linear-gradient(45deg, var(--c1), var(--c2)); border: 1px solid var(--border); box-shadow: 0 0 15px var(--glow); transition: all 0.3s ease; color: white; }
        .premium-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--c2); filter: brightness(1.2); }
        
        /* ⚡ TRUE ELECTRIC SHOCKWAVE */
        .shockwave { 
            position: absolute; background: transparent; 
            border: 2px solid var(--c2); border-radius: 50%; 
            box-shadow: 0 0 15px var(--glow), inset 0 0 15px var(--glow);
            transform: scale(0); animation: electricRipple 0.6s ease-out; pointer-events: none; 
        }
        @keyframes electricRipple { 
            0% { transform: scale(0); opacity: 1; border-width: 4px; } 
            100% { transform: scale(4.5); opacity: 0; border-width: 0px; } 
        }

        .tab-btn { padding: 10px 20px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 8px; transition: all 0.3s; cursor: pointer; }
        .tab-active { background: var(--bg-glow); border: 1px solid var(--c2); color: #fff; box-shadow: 0 0 10px var(--glow); }
        .tab-inactive { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.4); }

        .floating-btn { cursor: pointer; z-index: 9999 !important; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 12px; border-radius: 50%; transition: all 0.3s; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; border: 1px solid var(--glow); color: var(--c2); position: fixed; }
        .floating-btn:hover { transform: scale(1.1); background: var(--bg-glow); }

        @keyframes scoreLock { 0% { transform: scale(1); text-shadow: 0 0 5px var(--glow); } 50% { transform: scale(1.4); text-shadow: 0 0 30px var(--c2); color: #fff; } 100% { transform: scale(1); text-shadow: 0 0 10px var(--glow); } }
        .score-animate { animation: scoreLock 0.5s ease-out; }

        body.theme-luxury .glass-panel { background: #0a0a0a !important; backdrop-filter: none !important; border: 1px solid rgba(255,255,255,0.1) !important;}
        body.theme-luxury .anime-title { color: #fff !important; text-shadow: none !important;}
        body.theme-luxury .premium-btn { background: #fff !important; color: #000 !important; font-weight: 800 !important; }
        body.theme-luxury .tab-active { background: #fff !important; color: #000 !important; border: none; }
        body.theme-luxury .bg-video, body.theme-luxury .video-overlay { opacity: 0 !important; visibility: hidden; }
        body.theme-luxury .text-theme { color: #fff !important; }
        
        .matrix-text { white-space: pre-line; word-break: break-word; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--glow); border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">

    <video id="bg-vid" autoplay muted loop playsinline class="bg-video">
        <source src="https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20Natural%20Makeup%20Looks%20Inspiration%20for%20Summer-pin-id-587860557652168444.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div id="multiverse-btn" class="floating-btn" style="top: 20px; left: 20px;" onclick="cycleAura(event)">
        <i class="fa-solid fa-infinity text-xl"></i>
    </div>
    <div id="theme-btn" class="floating-btn" style="top: 20px; right: 20px;" onclick="toggleDomainExpansion(event)">
        <i id="theme-icon" class="fa-solid fa-crown text-lg"></i>
    </div>
    <div id="audio-btn" class="floating-btn" style="bottom: 20px; right: 20px;" onclick="toggleAudio(event)">
        <i id="audio-icon" class="fa-solid fa-volume-xmark text-sm"></i>
    </div>

    <div id="dashboard-viewport" class="w-full max-w-6xl flex-col relative z-10 flex mt-20 mb-10 px-2">
        
        <div class="w-full flex flex-col md:flex-row justify-between items-center mb-6">
            
            <div class="flex justify-between w-full md:w-auto items-center mb-5 md:mb-0">
                <div class="text-left">
                    <h1 class="anime-title text-4xl font-black mb-1 tracking-wide" id="main-title">HOOK FORGE</h1>
                    <p class="text-[10px] tracking-[0.3em] text-gray-300 font-bold uppercase"><i class="fa-solid fa-bolt mr-1 text-theme"></i> Premium Edition</p>
                </div>
                
                <div class="flex md:hidden items-center bg-black/40 p-1 rounded-full border border-white/10 backdrop-blur-md cursor-pointer hover:bg-white/10 transition shadow-lg border-theme">
                    <img src="https://ui-avatars.com/api/?name=Santosh+Choudhary&background=000&color=fff" alt="Profile" class="w-8 h-8 rounded-full border border-theme">
                </div>
            </div>
            
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <div class="flex space-x-2 bg-black/40 p-1.5 rounded-xl border border-white/10 backdrop-blur-md w-full md:w-auto justify-center">
                    <button id="tab-hook" onclick="switchMode('hook')" class="tab-btn tab-active"><i class="fa-solid fa-fire mr-1"></i> Hook Forge</button>
                    <button id="tab-script" onclick="switchMode('script')" class="tab-btn tab-inactive"><i class="fa-solid fa-scroll mr-1"></i> Script Forge</button>
                </div>

                <div class="hidden md:flex items-center gap-2 bg-black/40 p-1 pr-4 rounded-full border border-white/10 backdrop-blur-md cursor-pointer hover:bg-white/10 transition shadow-lg border-theme">
                    <img src="https://ui-avatars.com/api/?name=Santosh+Choudhary&background=000&color=fff" alt="Profile" class="w-8 h-8 rounded-full border border-theme">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-white">Santosh</span>
                </div>
            </div>
        </div>

        <div id="errorBox" class="hidden bg-red-900/90 border border-red-500 text-white p-4 rounded-lg mb-4 text-sm font-mono w-full shadow-lg"></div>

        <div class="flex flex-col lg:flex-row gap-6 w-full items-stretch">
            
            <div class="glass-panel w-full lg:w-1/3 p-6 flex flex-col justify-between">
                <div id="inputs-hook" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1">Target Niche</label>
                        <input type="text" id="h-niche" value="Anime & Tech" class="w-full glass-input rounded-lg px-4 py-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1">Target Audience</label>
                        <input type="text" id="h-audience" value="Content Creators" class="w-full glass-input rounded-lg px-4 py-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1">Tone Matrix</label>
                        <select id="h-tone" class="w-full glass-input rounded-lg px-4 py-3 text-sm">
                            <option value="Aggressive & Brutally Honest">Aggressive & Brutally Honest</option>
                            <option value="Curiosity Gap (Hold a secret)">Curiosity Gap (Hold a secret)</option>
                            <option value="Contrarian (Challenge the norm)">Contrarian (Challenge the norm)</option>
                            <option value="FOMO (Fear Of Missing Out)">FOMO (Fear Of Missing Out)</option>
                            <option value="Urgent / High Scarcity Matrix">Urgent / High Scarcity Matrix</option>
                            <option value="Storytelling (Vulnerable/Real)">Storytelling (Vulnerable/Real)</option>
                            <option value="Educational & Authoritative">Educational & Authoritative</option>
                            <option value="Minimalist / Straight to Point">Minimalist / Straight to Point</option>
                            <option value="Sarcastic & Witty Dialect">Sarcastic & Witty Dialect</option>
                            <option value="Call-out (Highly Targeted)">Call-out (Highly Targeted)</option>
                            <option value="Inspirational & Visionary Aura">Inspirational & Visionary Aura</option>
                            <option value="Fear-Inducing (Risk/Warning)">Fear-Inducing (Risk/Warning)</option>
                            <option value="Value-Bomb (Data & Proof)">Value-Bomb (Data & Proof)</option>
                            <option value="Trend-Jacking (Hyped Vibe)">Trend-Jacking (Hyped Vibe)</option>
                            <option value="Empathetic & Relatable">Empathetic & Relatable</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1">Core Topic</label>
                        <textarea id="h-topic" rows="3" class="w-full glass-input rounded-lg px-4 py-3 text-sm resize-none" placeholder="Enter core concept..."></textarea>
                    </div>
                </div>

                <div id="inputs-script" class="hidden space-y-4 flex-grow flex flex-col">
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1"><i class="fa-solid fa-crosshairs mr-1"></i> Target URL (Optional)</label>
                        <input type="url" id="s-url" class="w-full glass-input rounded-lg px-4 py-3 text-sm" placeholder="Paste link to crush...">
                    </div>
                    <div class="flex-grow flex flex-col">
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-theme mb-1 mt-2"><i class="fa-solid fa-code mr-1"></i> Raw Script Input</label>
                        <textarea id="s-raw" class="w-full flex-grow min-h-[180px] glass-input rounded-lg px-4 py-3 text-sm resize-none" placeholder="Paste script or notes..."></textarea>
                    </div>
                </div>

                <button onclick="createShockwave(event); igniteEngine();" id="btn-ignite" class="w-full premium-btn py-4 rounded-xl font-black tracking-widest uppercase text-xs mt-6 shadow-xl">
                    <i class="fa-solid fa-bolt mr-2"></i> Ignite Engine
                </button>
            </div>

            <div class="glass-panel flex-grow p-6 flex flex-col justify-center min-h-[500px] relative">
                
                <div id="loading" class="hidden text-center absolute inset-0 flex flex-col items-center justify-center bg-black/60 rounded-[20px] backdrop-blur-md z-20">
                    <i class="fa-solid fa-circle-notch fa-spin text-5xl text-theme mb-4"></i>
                    <h2 class="anime-title text-xl tracking-widest uppercase text-white font-bold">Extracting Matrix...</h2>
                </div>

                <div id="empty-state" class="text-center opacity-70">
                    <i class="fa-solid fa-crosshairs text-6xl text-theme opacity-50 mb-4" id="empty-icon"></i>
                    <p class="text-xs font-mono tracking-[0.2em] uppercase text-gray-300">Awaiting Target</p>
                </div>

                <div id="results-hook" class="hidden space-y-5 overflow-y-auto max-h-[550px] pr-2 custom-scrollbar">
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl relative">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] bg-theme-light text-white px-2 py-1 rounded font-black uppercase tracking-widest">Alpha</span>
                            <span class="text-[10px] text-theme font-black tracking-widest">SCORE: <span id="scoreA" class="text-theme text-lg font-black inline-block">0</span><span class="text-xs text-gray-500">/100</span></span>
                        </div>
                        <h3 id="textA" class="matrix-text text-base font-bold text-white mb-3 leading-relaxed tracking-wide"></h3>
                        <button onclick="copyText('textA')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white text-[10px] px-3 py-1.5 rounded uppercase font-bold transition-all"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
                    </div>

                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl relative">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] bg-theme-light text-white px-2 py-1 rounded font-black uppercase tracking-widest">Beta</span>
                            <span class="text-[10px] text-theme font-black tracking-widest">SCORE: <span id="scoreB" class="text-theme text-lg font-black inline-block">0</span><span class="text-xs text-gray-500">/100</span></span>
                        </div>
                        <h3 id="textB" class="matrix-text text-base font-bold text-white mb-3 leading-relaxed tracking-wide"></h3>
                        <button onclick="copyText('textB')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white text-[10px] px-3 py-1.5 rounded uppercase font-bold transition-all"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
                    </div>
                </div>

                <div id="results-script" class="hidden space-y-5 overflow-y-auto max-h-[550px] pr-2 custom-scrollbar">
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl flex justify-between items-center">
                        <div><h3 class="text-[11px] font-black tracking-widest uppercase text-theme mb-1">Retention Score</h3></div>
                        <div class="text-4xl font-black text-theme"><span id="s-score" class="inline-block">0</span><span class="text-lg opacity-40">/100</span></div>
                    </div>
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl">
                        <span class="text-[10px] bg-theme-light text-white px-2 py-1 rounded font-black uppercase tracking-widest mb-3 inline-block">Master Script</span>
                        <p id="s-master" class="matrix-text text-sm text-gray-200 leading-relaxed font-mono whitespace-pre-line"></p>
                        <button onclick="copyText('s-master')" class="mt-4 w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white text-[10px] px-3 py-2 rounded uppercase font-bold transition-all"><i class="fa-solid fa-copy mr-1"></i>Copy Script</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'hook'; let isMuted = true; let isLuxuryMode = false; let currentAura = 0;
        const videos = ["https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20Natural%20Makeup%20Looks%20Inspiration%20for%20Summer-pin-id-587860557652168444.mp4", "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/your_name.mp4", "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20From%20beginner%20to%20obsessed%20Love%20these%20easy%20pet-friendly%20home%20ideas%20youll%20want%20to%20recreate%20this%20weekend%20that%20balance%20trend%20comfor%20(1).mp4"];
        const themes = ['', 'theme-blue', 'theme-purple'];

        document.addEventListener("DOMContentLoaded", () => { document.getElementById('bg-vid').play().catch(e => console.log("Auto-play blocked")); });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-hook').className = mode === 'hook' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tab-script').className = mode === 'script' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('inputs-hook').style.display = mode === 'hook' ? 'block' : 'none';
            document.getElementById('inputs-script').style.display = mode === 'script' ? 'flex' : 'none';
            document.getElementById('btn-ignite').innerHTML = mode === 'hook' ? '<i class="fa-solid fa-bolt mr-2"></i> Ignite Hook Engine' : '<i class="fa-solid fa-scroll mr-2"></i> Forge Master Script';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('results-hook').style.display = 'none'; document.getElementById('results-script').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        function matrixDecrypt(elementId, targetText) {
            const el = document.getElementById(elementId);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*<>?';
            let iterations = 0; const maxIterations = 20; 
            const interval = setInterval(() => {
                el.innerText = targetText.split('').map((char, index) => {
                    if (index < (iterations / maxIterations) * targetText.length) return char;
                    if (char === ' ' || char === '\n') return char;
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                iterations++;
                if (iterations >= maxIterations) { clearInterval(interval); el.innerText = targetText; }
            }, 30); 
        }

        function createShockwave(e) {
            const btn = e.currentTarget; const circle = document.createElement('span');
            const d = Math.max(btn.clientWidth, btn.clientHeight);
            circle.style.width = circle.style.height = `${d}px`;
            const rect = btn.getBoundingClientRect();
            circle.style.left = `${e.clientX - rect.left - d/2}px`; circle.style.top = `${e.clientY - rect.top - d/2}px`;
            circle.className = 'shockwave';
            const oldShockwave = btn.querySelector('.shockwave'); if (oldShockwave) oldShockwave.remove();
            btn.appendChild(circle);
        }

        function animateScore(elementId, targetValue) {
            const scoreEl = document.getElementById(elementId); scoreEl.classList.remove('score-animate'); 
            let startValue = 0, duration = 1200, startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                scoreEl.innerText = Math.floor(progress * (targetValue - startValue) + startValue);
                if (progress < 1) window.requestAnimationFrame(step); else { scoreEl.innerText = targetValue; scoreEl.classList.add('score-animate'); }
            }
            window.requestAnimationFrame(step);
        }

        function cycleAura(e) {
            if (isLuxuryMode) return; createShockwave(e);
            const vid = document.getElementById('bg-vid'); vid.style.opacity = 0; 
            setTimeout(() => { 
                currentAura = (currentAura + 1) % videos.length; vid.src = videos[currentAura]; vid.play();
                document.body.className = `p-4 md:p-8 pb-32 ${themes[currentAura]}`; vid.style.opacity = 0.85; 
            }, 300);
        }

        function toggleDomainExpansion(e) {
            createShockwave(e); const body = document.body; const icon = document.getElementById('theme-icon'); 
            isLuxuryMode = !isLuxuryMode;
            if (isLuxuryMode) { body.className = 'p-4 md:p-8 pb-32 theme-luxury'; icon.className = 'fa-solid fa-eye text-lg'; } 
            else { body.className = `p-4 md:p-8 pb-32 ${themes[currentAura]}`; icon.className = 'fa-solid fa-crown text-lg'; }
        }

        function toggleAudio(e) {
            createShockwave(e); const vid = document.getElementById('bg-vid'); const icon = document.getElementById('audio-icon');
            isMuted = !isMuted; vid.muted = isMuted; icon.className = isMuted ? 'fa-solid fa-volume-xmark text-sm' : 'fa-solid fa-volume-high text-sm';
        }

        function copyText(id) { 
            const text = document.getElementById(id).innerText; navigator.clipboard.writeText(text);
            const btn = event.currentTarget; const oldHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>Copied!'; setTimeout(() => { btn.innerHTML = oldHTML; }, 1500);
        }

        async function igniteEngine() {
            document.getElementById('empty-state').style.display = 'none'; document.getElementById('results-hook').style.display = 'none';
            document.getElementById('results-script').style.display = 'none'; document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            try {
                let endpoint = currentMode === 'hook' ? '/forge_hook' : '/forge_script';
                let payloadData = currentMode === 'hook' ? { niche: document.getElementById('h-niche').value, audience: document.getElementById('h-audience').value, tone: document.getElementById('h-tone').value, topic: document.getElementById('h-topic').value } : { script: document.getElementById('s-raw').value, url: document.getElementById('s-url').value };
                const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloadData) });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.error) throw new Error(data.error);

                if (currentMode === 'hook') {
                    document.getElementById('results-hook').style.display = 'block';
                    animateScore('scoreA', data.hook_a.score); animateScore('scoreB', data.hook_b.score);
                    matrixDecrypt('textA', `"${data.hook_a.text}"`); matrixDecrypt('textB', `"${data.hook_b.text}"`);
                } else {
                    document.getElementById('results-script').style.display = 'block';
                    animateScore('s-score', data.retention_score); matrixDecrypt('s-master', data.master_script);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorBox').innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> <b>System Error:</b> ${err.message}`; 
                document.getElementById('errorBox').style.display = 'block'; document.getElementById('empty-state').style.display = 'block';
            }
        }
    </script>
</body>
</html>
