<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Forge | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 DYNAMIC THEMES */
        :root {
            --c1: #dc2626; /* Crimson Red */
            --c2: #f97316; /* Bright Orange */
            --border: rgba(239, 68, 68, 0.4); 
            --glow: rgba(239, 68, 68, 0.5); 
            --bg-glow: rgba(239, 68, 68, 0.15);
        }
        body.theme-blue {
            --c1: #1d4ed8; 
            --c2: #3b82f6; 
            --border: rgba(59,130,246, 0.4);
            --glow: rgba(59,130,246, 0.5); 
            --bg-glow: rgba(59,130,246, 0.15);
        }
        body.theme-purple {
            --c1: #7e22ce; 
            --c2: #a855f7; 
            --border: rgba(168,85,247, 0.4);
            --glow: rgba(168,85,247, 0.5); 
            --bg-glow: rgba(168,85,247, 0.15);
        }
        body.theme-luxury {
            --c1: #ffffff; --c2: #ffffff; --border: rgba(255,255,255,0.2); 
            --glow: rgba(255,255,255,0.1); --bg-glow: transparent; background-color: #050505 !important;
        }

        html, body { margin: 0; min-height: 100vh; font-family: 'Noto Sans JP', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; position: relative; }
        
        /* 🌟 Z-INDEX STACKING STRICTLY LOCKED */
        .bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; opacity: 1; transition: opacity 0.5s ease; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.35); z-index: 2; pointer-events: none; }
        #dashboard-viewport { z-index: 10; position: relative; }
        
        /* 💎 EXACT DARK CRYSTAL GLASS FROM YOUR FAVORITE SCREENSHOT */
        .glass-panel {
            background: rgba(15, 15, 15, 0.4) !important;
            backdrop-filter: blur(8px) !important; 
            -webkit-backdrop-filter: blur(8px) !important; 
            border: 1px solid var(--border) !important;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
            transition: all 0.4s ease;
        }
        
        .anime-title { font-family: 'Cinzel', serif; color: var(--c2); text-shadow: 0 0 15px var(--glow); transition: color 0.4s, text-shadow 0.4s;}
        .text-theme { color: var(--c2) !important; transition: color 0.4s; }
        
        /* SHARP INPUTS */
        .glass-input { 
            background: rgba(0, 0, 0, 0.5) !important; 
            border: 1px solid rgba(255,255,255,0.08) !important; 
            color: #fff; transition: all 0.3s; 
            border-radius: 8px;
        }
        .glass-input:focus { outline: none; border-color: var(--c2) !important; box-shadow: 0 0 10px var(--glow) !important; background: rgba(0,0,0,0.8) !important; }
        select.glass-input option { background: #111; color: #fff; }
        
        /* PREMIUM BUTTON */
        .premium-btn { position: relative; overflow: hidden; cursor: pointer; background: linear-gradient(45deg, var(--c1), var(--c2)); border: 1px solid var(--border); box-shadow: 0 0 15px var(--glow); transition: all 0.4s ease; color: white; }
        .premium-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--c2); filter: brightness(1.1); }
        
        /* ⚡ SHOCKWAVE */
        .shockwave { position: absolute; background: transparent; border: 2px solid var(--c2); border-radius: 50%; box-shadow: 0 0 10px var(--glow); transform: scale(0); animation: electricRipple 0.6s ease-out; pointer-events: none; }
        @keyframes electricRipple { 0% { transform: scale(0); opacity: 1; border-width: 3px; } 100% { transform: scale(4); opacity: 0; border-width: 0px; } }

        .tab-btn { padding: 10px 20px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 8px; transition: all 0.3s; cursor: pointer; border: 1px solid transparent; }
        .tab-active { background: rgba(0,0,0,0.6); border-color: var(--c2); color: var(--c2); box-shadow: 0 0 10px var(--glow); }
        .tab-inactive { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.5); }

        .floating-btn { cursor: pointer; z-index: 9000 !important; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 12px; border-radius: 50%; transition: all 0.3s; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; border: 1px solid var(--border); color: var(--c2); position: fixed; }
        .floating-btn:hover { transform: scale(1.1); background: var(--bg-glow); }

        /* 👑 SAAS PROFILE MENU */
        .profile-menu {
            position: absolute; top: 110%; right: 0; width: 220px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s ease; z-index: 9999;
        }
        .profile-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .profile-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; color: #e5e5e5; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; }
        .profile-item:hover { background: rgba(255, 255, 255, 0.1); color: #fff; padding-left: 20px; }
        .profile-divider { height: 1px; background: rgba(255, 255, 255, 0.1); margin: 4px 0; }

        @keyframes scoreLock { 0% { transform: scale(1); text-shadow: 0 0 5px var(--glow); } 50% { transform: scale(1.4); text-shadow: 0 0 20px var(--c2); color: #fff; } 100% { transform: scale(1); text-shadow: 0 0 10px var(--glow); } }
        .score-animate { animation: scoreLock 0.5s ease-out; }

        body.theme-luxury .glass-panel, body.theme-luxury .profile-menu { background: #0a0a0a !important; backdrop-filter: none !important; border: 1px solid rgba(255,255,255,0.1) !important;}
        body.theme-luxury .anime-title { color: #fff !important; text-shadow: none !important;}
        body.theme-luxury .premium-btn { background: #fff !important; color: #000 !important; font-weight: 800 !important; box-shadow: none; border-color: #fff !important; }
        body.theme-luxury .tab-active { background: #fff !important; color: #000 !important; border: none; box-shadow: none; }
        body.theme-luxury .bg-video, body.theme-luxury .video-overlay { opacity: 0 !important; visibility: hidden; }
        body.theme-luxury .text-theme { color: #fff !important; }
        
        .matrix-text { white-space: pre-line; word-break: break-word; }
    </style>
</head>

    <script>
        let currentMode = 'hook'; let isMuted = true; let isLuxuryMode = false; let currentAura = 0;
        
        const videos = [
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20Natural%20Makeup%20Looks%20Inspiration%20for%20Summer-pin-id-587860557652168444.mp4", 
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/your_name.mp4", 
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20From%20beginner%20to%20obsessed%20Love%20these%20easy%20pet-friendly%20home%20ideas%20youll%20want%20to%20recreate%20this%20weekend%20that%20balance%20trend%20comfor%20(1).mp4"
        ];
        
        const themes = ['', 'theme-blue', 'theme-purple'];

        document.addEventListener("DOMContentLoaded", () => { document.getElementById('bg-vid').play().catch(e => console.log("Auto-play blocked")); });

        function toggleProfileMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('profile-menu'); const arrow = document.getElementById('profile-arrow');
            menu.classList.toggle('active');
            arrow.style.transform = menu.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('profile-menu'); const wrapper = document.getElementById('profile-wrapper'); const arrow = document.getElementById('profile-arrow');
            if (menu && menu.classList.contains('active') && !wrapper.contains(e.target)) {
                menu.classList.remove('active');
                if (arrow) arrow.style.transform = 'rotate(0deg)';
            }
        });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-hook').className = mode === 'hook' ? 'tab-btn tab-active flex-1 md:flex-none' : 'tab-btn tab-inactive flex-1 md:flex-none';
            document.getElementById('tab-script').className = mode === 'script' ? 'tab-btn tab-active flex-1 md:flex-none' : 'tab-btn tab-inactive flex-1 md:flex-none';
            document.getElementById('inputs-hook').style.display = mode === 'hook' ? 'block' : 'none';
            document.getElementById('inputs-script').style.display = mode === 'script' ? 'flex' : 'none';
            document.getElementById('btn-ignite').innerHTML = mode === 'hook' ? '<i class="fa-solid fa-bolt mr-2"></i> Ignite Hook Engine' : '<i class="fa-solid fa-scroll mr-2"></i> Forge Master Script';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('results-hook').style.display = 'none'; document.getElementById('results-script').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        function matrixDecrypt(elementId, targetText) {
            const el = document.getElementById(elementId);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*<>?';
            let iterations = 0; const maxIterations = 20; 
            const interval = setInterval(() => {
                el.innerText = targetText.split('').map((char, index) => {
                    if (index < (iterations / maxIterations) * targetText.length) return char;
                    if (char === ' ' || char === '\n') return char;
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                iterations++;
                if (iterations >= maxIterations) { clearInterval(interval); el.innerText = targetText; }
            }, 30); 
        }

        function createShockwave(e) {
            const btn = e.currentTarget; const circle = document.createElement('span');
            const d = Math.max(btn.clientWidth, btn.clientHeight);
            circle.style.width = circle.style.height = `${d}px`;
            const rect = btn.getBoundingClientRect();
            circle.style.left = `${e.clientX - rect.left - d/2}px`; circle.style.top = `${e.clientY - rect.top - d/2}px`;
            circle.className = 'shockwave';
            const oldShockwave = btn.querySelector('.shockwave'); if (oldShockwave) oldShockwave.remove();
            btn.appendChild(circle);
        }

        function animateScore(elementId, targetValue) {
            const scoreEl = document.getElementById(elementId); scoreEl.classList.remove('score-animate'); 
            let startValue = 0, duration = 1200, startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                scoreEl.innerText = Math.floor(progress * (targetValue - startValue) + startValue);
                if (progress < 1) window.requestAnimationFrame(step); else { scoreEl.innerText = targetValue; scoreEl.classList.add('score-animate'); }
            }
            window.requestAnimationFrame(step);
        }

        /* 🌟 JS THEME BUG FIXED: Safely adds/removes classes without destroying layout */
        function cycleAura(e) {
            if (isLuxuryMode) return; createShockwave(e);
            const vid = document.getElementById('bg-vid'); vid.style.opacity = 0; 
            setTimeout(() => { 
                currentAura = (currentAura + 1) % videos.length; 
                vid.src = videos[currentAura]; 
                vid.play();
                
                document.body.classList.remove('theme-blue', 'theme-purple');
                if(themes[currentAura]) document.body.classList.add(themes[currentAura]);
                
                vid.style.opacity = 1; 
            }, 300);
        }

        function toggleDomainExpansion(e) {
            createShockwave(e); const body = document.body; const icon = document.getElementById('theme-icon'); 
            isLuxuryMode = !isLuxuryMode;
            if (isLuxuryMode) { body.classList.add('theme-luxury'); icon.className = 'fa-solid fa-eye text-lg'; } 
            else { body.classList.remove('theme-luxury'); icon.className = 'fa-solid fa-crown text-lg'; }
        }

        function toggleAudio(e) {
            createShockwave(e); const vid = document.getElementById('bg-vid'); const icon = document.getElementById('audio-icon');
            isMuted = !isMuted; vid.muted = isMuted; icon.className = isMuted ? 'fa-solid fa-volume-xmark text-sm' : 'fa-solid fa-volume-high text-sm';
        }

        function copyText(id) { 
            const text = document.getElementById(id).innerText; navigator.clipboard.writeText(text);
            const btn = event.currentTarget; const oldHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>Copied!'; setTimeout(() => { btn.innerHTML = oldHTML; }, 1500);
        }

        async function igniteEngine() {
            document.getElementById('empty-state').style.display = 'none'; document.getElementById('results-hook').style.display = 'none';
            document.getElementById('results-script').style.display = 'none'; document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            try {
                let endpoint = currentMode === 'hook' ? '/forge_hook' : '/forge_script';
                let payloadData = currentMode === 'hook' ? { niche: document.getElementById('h-niche').value, audience: document.getElementById('h-audience').value, tone: document.getElementById('h-tone').value, topic: document.getElementById('h-topic').value } : { script: document.getElementById('s-raw').value, url: document.getElementById('s-url').value };
                const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloadData) });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.error) throw new Error(data.error);

                if (currentMode === 'hook') {
                    document.getElementById('results-hook').style.display = 'block';
                    animateScore('scoreA', data.hook_a.score); animateScore('scoreB', data.hook_b.score);
                    matrixDecrypt('textA', `"${data.hook_a.text}"`); matrixDecrypt('textB', `"${data.hook_b.text}"`);
                } else {
                    document.getElementById('results-script').style.display = 'block';
                    animateScore('s-score', data.retention_score); matrixDecrypt('s-master', data.master_script);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorBox').innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> <b>System Error:</b> ${err.message}`; 
                document.getElementById('errorBox').style.display = 'block'; document.getElementById('empty-state').style.display = 'block';
            }
        }
    </script>
</body>
</html>
