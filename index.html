<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hook Forge | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DYNAMIC THEME ENGINE */
        :root {
            /* DEFAULT: Premium Orange (Non-Anime) */
            --c1: #ea580c; 
            --c2: #f97316; 
            --border: #fdba74; 
            --glow: rgba(249,115,22, 0.4);
            --bg-glow: rgba(249,115,22, 0.15);
        }
        body.theme-blue {
            /* Anime Theme 1: Neon Blue */
            --c1: #1d4ed8; 
            --c2: #3b82f6; 
            --border: #93c5fd; 
            --glow: rgba(59,130,246, 0.4);
            --bg-glow: rgba(59,130,246, 0.15);
        }
        body.theme-purple {
            /* Anime Theme 2: Amethyst Purple */
            --c1: #7e22ce; 
            --c2: #a855f7; 
            --border: #d8b4fe; 
            --glow: rgba(168,85,247, 0.4);
            --bg-glow: rgba(168,85,247, 0.15);
        }
        body.theme-luxury {
            /* Luxury Crown Theme: Pitch Black & White */
            --c1: #ffffff; 
            --c2: #ffffff; 
            --border: rgba(255,255,255,0.2); 
            --glow: rgba(255,255,255,0.1);
            --bg-glow: transparent;
            background-color: #030303 !important;
        }

        /* CORE STYLES */
        body {
            margin: 0; min-height: 100vh; font-family: 'Noto Sans JP', sans-serif;
            background-color: #000; color: #fffbeb; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            overflow-x: hidden; position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* CRYSTAL CLEAR VIDEO BACKGROUND */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; pointer-events: none;
            transition: opacity 0.5s ease-in-out; opacity: 0.85;
        }
        .video-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.2); z-index: 1; pointer-events: none; }
        
        /* ADAPTIVE TRUE GLASS PANELS */
        .glass-panel {
            background: rgba(10, 10, 10, 0.35); /* High transparency for video */
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glow);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px var(--bg-glow);
            transition: all 0.5s ease;
            z-index: 10;
        }
        
        /* DYNAMIC TEXT & ACCENTS */
        .anime-title { font-family: 'Cinzel', serif; color: var(--c2); text-shadow: 0 0 25px var(--glow); transition: color 0.5s, text-shadow 0.5s;}
        .text-theme { color: var(--c2) !important; transition: color 0.5s; }
        .border-theme { border-color: var(--glow) !important; transition: border-color 0.5s; }
        .bg-theme-light { background-color: var(--bg-glow) !important; transition: background-color 0.5s;}
        
        /* SLEEK INPUTS */
        .glass-input { 
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); 
            color: #fffbeb; transition: all 0.3s; 
        }
        .glass-input:focus { outline: none; border-color: var(--c2); box-shadow: 0 0 15px var(--glow); background: rgba(0,0,0,0.8); }
        select.glass-input option { background: #111; color: #fffbeb; }
        
        /* DYNAMIC GRADIENT BUTTON */
        .premium-btn { 
            position: relative; overflow: hidden; cursor: pointer;
            background: linear-gradient(45deg, var(--c1), var(--c2)); border: 1px solid var(--border); 
            box-shadow: 0 0 20px var(--glow); transition: all 0.3s ease; color: white;
        }
        .premium-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px var(--c2); filter: brightness(1.2); }
        
        /* SHOCKWAVE */
        .shockwave { position: absolute; background: rgba(255, 255, 255, 0.7); border-radius: 50%; transform: scale(0); animation: ripple 0.5s cubic-bezier(0.1, 0.8, 0.3, 1); pointer-events: none; }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        /* TABS */
        .tab-btn { padding: 12px 24px; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 8px; transition: all 0.3s; cursor: pointer; }
        .tab-active { background: var(--bg-glow); border: 1px solid var(--c2); color: #fffbeb; box-shadow: 0 0 15px var(--glow); }
        .tab-inactive { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.4); }
        .tab-inactive:hover { background: rgba(255,255,255,0.05); color: #fff; }

        /* FIXED FLOATING UI BUTTONS (TOP & BOTTOM) */
        .floating-btn { 
            cursor: pointer; z-index: 9999 !important; background: rgba(10,10,10,0.75); 
            backdrop-filter: blur(8px); padding: 15px; border-radius: 50%; transition: all 0.3s; 
            display: flex; align-items: center; justify-content: center; width: 55px; height: 55px; 
            border: 1px solid var(--glow); color: var(--c2);
            box-shadow: 0 0 15px var(--glow); position: fixed;
        }
        .floating-btn:hover { transform: scale(1.1); background: var(--bg-glow); }

        /* SLOT MACHINE ANIMATION */
        @keyframes scoreLock { 0% { transform: scale(1); text-shadow: 0 0 10px var(--glow); } 50% { transform: scale(1.4); text-shadow: 0 0 40px var(--c2); color: #fff; } 100% { transform: scale(1); text-shadow: 0 0 15px var(--glow); } }
        .score-animate { animation: scoreLock 0.5s ease-out; }

        /* LUXURY OVERRIDES */
        body.theme-luxury .glass-panel { background: #0a0a0a !important; backdrop-filter: none !important; border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 20px 50px rgba(0,0,0,1) !important;}
        body.theme-luxury .anime-title { font-family: 'Inter', sans-serif !important; font-weight: 800 !important; color: #fff !important; text-shadow: none !important;}
        body.theme-luxury .premium-btn { background: #fff !important; color: #000 !important; font-weight: 800 !important; }
        body.theme-luxury .tab-active { background: #fff !important; color: #000 !important; border: none; }
        body.theme-luxury .bg-video, body.theme-luxury .video-overlay { opacity: 0 !important; visibility: hidden; }
        body.theme-luxury .text-theme { color: #fff !important; }
        body.theme-luxury #multiverse-btn { opacity: 0; pointer-events: none; }
        
        .matrix-text { white-space: pre-line; word-break: break-word; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--glow); border-radius: 4px; }
    </style>
</head>

    <script>
        let currentMode = 'hook';
        let isMuted = true;
        let isLuxuryMode = false;
        let currentAura = 0;

        const videos = [
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20Natural%20Makeup%20Looks%20Inspiration%20for%20Summer-pin-id-587860557652168444.mp4",
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/your_name.mp4",
            "https://subczjjxgexeraofhykl.supabase.co/storage/v1/object/public/Assets/From%20Klickpin.com-%20From%20beginner%20to%20obsessed%20Love%20these%20easy%20pet-friendly%20home%20ideas%20youll%20want%20to%20recreate%20this%20weekend%20that%20balance%20trend%20comfor%20(1).mp4"
        ];
        
        const themes = ['', 'theme-blue', 'theme-purple']; // index 0 is default orange

        document.addEventListener("DOMContentLoaded", () => {
            const vid = document.getElementById('bg-vid');
            vid.play().catch(e => console.log("Auto-play blocked"));
        });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-hook').className = mode === 'hook' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tab-script').className = mode === 'script' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('inputs-hook').style.display = mode === 'hook' ? 'block' : 'none';
            document.getElementById('inputs-script').style.display = mode === 'script' ? 'flex' : 'none';
            document.getElementById('btn-ignite').innerHTML = mode === 'hook' ? '<i class="fa-solid fa-bolt mr-2"></i> Ignite Hook Engine' : '<i class="fa-solid fa-scroll mr-2"></i> Forge Master Script';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('results-hook').style.display = 'none'; document.getElementById('results-script').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
        }

        // FEATURE 3: MATRIX DECRYPTION
        function matrixDecrypt(elementId, targetText) {
            const el = document.getElementById(elementId);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*<>?';
            let iterations = 0; const maxIterations = 25; 
            const interval = setInterval(() => {
                el.innerText = targetText.split('').map((char, index) => {
                    if (index < (iterations / maxIterations) * targetText.length) return char;
                    if (char === ' ' || char === '\n') return char;
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join('');
                iterations++;
                if (iterations >= maxIterations) { clearInterval(interval); el.innerText = targetText; }
            }, 30); 
        }

        // FEATURE 2: SHOCKWAVE TRIGGER
        function createShockwave(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const d = Math.max(btn.clientWidth, btn.clientHeight);
            circle.style.width = circle.style.height = `${d}px`;
            const rect = btn.getBoundingClientRect();
            circle.style.left = `${e.clientX - rect.left - d/2}px`;
            circle.style.top = `${e.clientY - rect.top - d/2}px`;
            circle.className = 'shockwave';
            const oldShockwave = btn.querySelector('.shockwave');
            if (oldShockwave) oldShockwave.remove();
            btn.appendChild(circle);
        }

        // FEATURE 4: SLOT MACHINE SCORE
        function animateScore(elementId, targetValue) {
            const scoreEl = document.getElementById(elementId);
            scoreEl.classList.remove('score-animate'); 
            let startValue = 0, duration = 1200, startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                scoreEl.innerText = Math.floor(progress * (targetValue - startValue) + startValue);
                if (progress < 1) window.requestAnimationFrame(step);
                else { scoreEl.innerText = targetValue; scoreEl.classList.add('score-animate'); }
            }
            window.requestAnimationFrame(step);
        }

        // FEATURE 1: MULTIVERSE (WITH DYNAMIC THEMES)
        function cycleAura(e) {
            if (isLuxuryMode) return;
            createShockwave(e);
            const vid = document.getElementById('bg-vid');
            vid.style.opacity = 0; 
            setTimeout(() => { 
                currentAura = (currentAura + 1) % videos.length;
                vid.src = videos[currentAura]; 
                vid.play();
                
                // Switch the CSS class dynamically
                document.body.className = `p-4 md:p-8 pb-32 ${themes[currentAura]}`;
                vid.style.opacity = 0.85; 
            }, 300);
        }

        function toggleDomainExpansion(e) {
            createShockwave(e); 
            const body = document.body; const icon = document.getElementById('theme-icon'); 
            isLuxuryMode = !isLuxuryMode;
            if (isLuxuryMode) {
                body.className = 'p-4 md:p-8 pb-32 theme-luxury'; 
                icon.className = 'fa-solid fa-eye text-xl';
            } else {
                body.className = `p-4 md:p-8 pb-32 ${themes[currentAura]}`; 
                icon.className = 'fa-solid fa-crown text-xl';
            }
        }

        function toggleAudio(e) {
            createShockwave(e);
            const vid = document.getElementById('bg-vid'); const icon = document.getElementById('audio-icon');
            isMuted = !isMuted; vid.muted = isMuted; icon.className = isMuted ? 'fa-solid fa-volume-xmark text-lg' : 'fa-solid fa-volume-high text-lg';
        }

        function copyText(id) { 
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const btn = event.currentTarget; const oldHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Copied!';
            setTimeout(() => { btn.innerHTML = oldHTML; }, 1500);
        }

        async function igniteEngine() {
            document.getElementById('empty-state').style.display = 'none'; 
            document.getElementById('results-hook').style.display = 'none';
            document.getElementById('results-script').style.display = 'none'; 
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            try {
                let endpoint = currentMode === 'hook' ? '/forge_hook' : '/forge_script';
                let payloadData = currentMode === 'hook' ? { niche: document.getElementById('h-niche').value, audience: document.getElementById('h-audience').value, tone: document.getElementById('h-tone').value, topic: document.getElementById('h-topic').value } : { script: document.getElementById('s-raw').value, url: document.getElementById('s-url').value };
                const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloadData) });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.error) throw new Error(data.error);

                if (currentMode === 'hook') {
                    document.getElementById('results-hook').style.display = 'block';
                    animateScore('scoreA', data.hook_a.score);
                    animateScore('scoreB', data.hook_b.score);
                    matrixDecrypt('textA', `"${data.hook_a.text}"`); 
                    matrixDecrypt('textB', `"${data.hook_b.text}"`);
                } else {
                    document.getElementById('results-script').style.display = 'block';
                    animateScore('s-score', data.retention_score); 
                    matrixDecrypt('s-master', data.master_script);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorBox').innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> <b>System Error:</b> ${err.message}`; 
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('empty-state').style.display = 'block';
            }
        }
    </script>
</body>
</html>
